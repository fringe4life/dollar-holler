name: Fallow

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  boundaries:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Architecture boundaries
        run: bun run fallow:boundary-violations
